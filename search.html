<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Partners - SkillExchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <div class="p-4">
                <h4><i class="fas fa-exchange-alt"></i> SkillExchange</h4>
                <hr class="bg-light">
                <div class="text-center mb-4">
                    <i class="fas fa-user-circle fa-3x"></i>
                    <p class="mt-2" id="userName"></p>
                </div>
            </div>
            <a href="dashboard.html"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
            <a href="profile.html"><i class="fas fa-user me-2"></i> My Profile</a>
            <a href="skills.html"><i class="fas fa-tasks me-2"></i> Manage Skills</a>
            <a href="search.html"><i class="fas fa-search me-2"></i> Find Partners</a>
            <a href="requests.html"><i class="fas fa-envelope me-2"></i> Exchange Requests</a>
            <a href="matches.html"><i class="fas fa-handshake me-2"></i> Skill Matches</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </div>
        
        <div class="main-content">
            <div class="container">
                <div class="card">
                    <div class="card-header bg-gradient text-white">
                        <h4><i class="fas fa-search"></i> Find Learning Partners</h4>
                    </div>
                    <div class="card-body">
                        <form id="searchForm" class="mb-4">
                            <div class="row">
                                <div class="col-md-6">
                                    <input type="text" class="form-control" id="search" placeholder="Search by skill or name...">
                                </div>
                                <div class="col-md-4">
                                    <select class="form-control" id="skillType">
                                        <option value="">All Skills</option>
                                        <option value="teach">People Who Can Teach</option>
                                        <option value="learn">People Who Want to Learn</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-primary w-100">Search</button>
                                </div>
                            </div>
                        </form>
                        
                        <div id="searchResults"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        function searchUsers() {
            const search = $('#search').val();
            const skillType = $('#skillType').val();
            
            $.ajax({
                url: 'api/search_users.php',
                method: 'GET',
                data: { search: search, skill_type: skillType },
                success: function(response) {
                    if (response.success && response.users.length > 0) {
                        let html = '<div class="row">';
                        response.users.forEach(user => {
                            const teachSkills = user.skills.filter(s => s.skill_type === 'teach');
                            const learnSkills = user.skills.filter(s => s.skill_type === 'learn');
                            
                            html += `
                                <div class="col-md-6 mb-3">
                                    <div class="card">
                                        <div class="card-body">
                                            <h5>${user.name}</h5>
                                            <p class="text-muted">${user.department} - Semester ${user.semester}</p>
                                            <div>
                                                <strong>Can Teach:</strong><br>
                                                ${teachSkills.map(s => `<span class="skill-badge">${s.skill_name}</span>`).join('') || 'None'}
                                            </div>
                                            <div class="mt-2">
                                                <strong>Wants to Learn:</strong><br>
                                                ${learnSkills.map(s => `<span class="skill-badge" style="background:#28a745">${s.skill_name}</span>`).join('') || 'None'}
                                            </div>
                                            <button class="btn btn-primary btn-sm mt-3" onclick="sendExchangeRequest(${user.id})">
                                                Send Exchange Request
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        html += '</div>';
                        $('#searchResults').html(html);
                    } else {
                        $('#searchResults').html('<div class="alert alert-info">No users found</div>');
                    }
                }
            });
        }
        
        function sendExchangeRequest(userId) {
            const skillToLearn = prompt("What skill do you want to learn from this person?");
            const skillToOffer = prompt("What skill can you offer in return?");
            
            if (skillToLearn && skillToOffer) {
                $.ajax({
                    url: 'api/send_request.php',
                    method: 'POST',
                    data: {
                        receiver_id: userId,
                        skill_offered: skillToOffer,
                        skill_requested: skillToLearn
                    },
                    success: function(response) {
                        if (response.success) {
                            alert('Exchange request sent successfully!');
                        } else {
                            alert('Error: ' + response.message);
                        }
                    }
                });
            }
        }
        
        $('#searchForm').on('submit', function(e) {
            e.preventDefault();
            searchUsers();
        });
        
        $(document).ready(function() {
            $('#userName').text(localStorage.getItem('user_name'));
            searchUsers();
        });
    </script>
</body>
</html>
