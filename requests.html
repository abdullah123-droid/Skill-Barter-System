<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange Requests - SkillExchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <div class="p-4">
                <h4><i class="fas fa-exchange-alt"></i> SkillExchange</h4>
                <hr class="bg-light">
                <div class="text-center mb-4">
                    <i class="fas fa-user-circle fa-3x"></i>
                    <p class="mt-2" id="userName"></p>
                </div>
            </div>
            <a href="dashboard.html"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
            <a href="profile.html"><i class="fas fa-user me-2"></i> My Profile</a>
            <a href="skills.html"><i class="fas fa-tasks me-2"></i> Manage Skills</a>
            <a href="search.html"><i class="fas fa-search me-2"></i> Find Partners</a>
            <a href="requests.html"><i class="fas fa-envelope me-2"></i> Exchange Requests</a>
            <a href="matches.html"><i class="fas fa-handshake me-2"></i> Skill Matches</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </div>
        
        <div class="main-content">
            <div class="container">
                <ul class="nav nav-tabs mb-4">
                    <li class="nav-item">
                        <a class="nav-link active" data-bs-toggle="tab" href="#received">Received Requests</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="tab" href="#sent">Sent Requests</a>
                    </li>
                </ul>
                
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="received">
                        <div id="receivedRequests"></div>
                    </div>
                    <div class="tab-pane fade" id="sent">
                        <div id="sentRequests"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        function loadRequests() {
            $.ajax({
                url: 'api/get_requests.php',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        // Received requests
                        let receivedHtml = '';
                        response.received.forEach(req => {
                            const statusColor = req.status === 'pending' ? 'warning' : (req.status === 'accepted' ? 'success' : 'danger');
                            receivedHtml += `
                                <div class="card mb-3">
                                    <div class="card-body">
                                        <h5>From: ${req.sender_name}</h5>
                                        <p>Wants to learn: <strong>${req.skill_requested}</strong></p>
                                        <p>Offers: <strong>${req.skill_offered}</strong></p>
                                        <p>Status: <span class="badge bg-${statusColor}">${req.status}</span></p>
                                        ${req.status === 'pending' ? `
                                            <button class="btn btn-success btn-sm" onclick="respondToRequest(${req.id}, 'accept')">Accept</button>
                                            <button class="btn btn-danger btn-sm" onclick="respondToRequest(${req.id}, 'reject')">Reject</button>
                                        ` : ''}
                                    </div>
                                </div>
                            `;
                        });
                        if (response.received.length === 0) receivedHtml = '<div class="alert alert-info">No received requests</div>';
                        $('#receivedRequests').html(receivedHtml);
                        
                        // Sent requests
                        let sentHtml = '';
                        response.sent.forEach(req => {
                            const statusColor = req.status === 'pending' ? 'warning' : (req.status === 'accepted' ? 'success' : 'danger');
                            sentHtml += `
                                <div class="card mb-3">
                                    <div class="card-body">
                                        <h5>To: ${req.receiver_name}</h5>
                                        <p>You want to learn: <strong>${req.skill_requested}</strong></p>
                                        <p>You offered: <strong>${req.skill_offered}</strong></p>
                                        <p>Status: <span class="badge bg-${statusColor}">${req.status}</span></p>
                                    </div>
                                </div>
                            `;
                        });
                        if (response.sent.length === 0) sentHtml = '<div class="alert alert-info">No sent requests</div>';
                        $('#sentRequests').html(sentHtml);
                    }
                }
            });
        }
        
        function respondToRequest(requestId, action) {
            $.ajax({
                url: 'api/respond_request.php',
                method: 'POST',
                data: {
                    request_id: requestId,
                    action: action
                },
                success: function(response) {
                    if (response.success) {
                        loadRequests();
                    }
                }
            });
        }
        
        $(document).ready(function() {
            $('#userName').text(localStorage.getItem('user_name'));
            loadRequests();
        });
    </script>
</body>
</html>
