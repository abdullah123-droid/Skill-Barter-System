<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - SkillExchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: fixed;
            height: 100%;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 15px 20px;
            transition: all 0.3s;
        }
        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            padding-left: 30px;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }
        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        .profile-header i {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="text-center p-4">
            <i class="fas fa-user-circle fa-3x"></i>
            <p class="mt-2" id="userName">User</p>
        </div>
        <a href="dashboard.html"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
        <a href="profile.html"><i class="fas fa-user me-2"></i> My Profile</a>
        <a href="skills.html"><i class="fas fa-tasks me-2"></i> Manage Skills</a>
        <a href="search.html"><i class="fas fa-search me-2"></i> Find Partners</a>
        <a href="requests.html"><i class="fas fa-envelope me-2"></i> Exchange Requests</a>
        <a href="matches.html"><i class="fas fa-handshake me-2"></i> Skill Matches</a>
        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <div class="main-content">
        <div class="container">
            <!-- Current Profile Display -->
            <div class="profile-header">
                <i class="fas fa-user-circle"></i>
                <h2 id="displayName">Loading...</h2>
                <p id="displayEmail">Loading...</p>
                <p><i class="fas fa-building"></i> <span id="displayDepartment">Loading...</span> | <i class="fas fa-graduation-cap"></i> Semester <span id="displaySemester">Loading...</span></p>
            </div>

            <!-- Edit Profile Form -->
            <div class="card">
                <div class="card-header bg-gradient text-white">
                    <h4><i class="fas fa-edit"></i> Edit Profile</h4>
                </div>
                <div class="card-body">
                    <form id="updateProfileForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="editName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email (Cannot be changed)</label>
                            <input type="email" class="form-control" id="editEmail" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <input type="text" class="form-control" id="editDepartment" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Semester</label>
                            <input type="number" class="form-control" id="editSemester" min="1" max="8" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Update Profile</button>
                    </form>
                    <div id="updateMessage" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check if user is logged in
        const userId = localStorage.getItem('user_id');
        const userName = localStorage.getItem('user_name');
        
        if (!userId) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('userName').textContent = userName;

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Load and display current profile
        function loadProfile() {
            $.ajax({
                url: 'api/get_user_profile.php',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        // Update display section
                        $('#displayName').text(response.user.name);
                        $('#displayEmail').text(response.user.email);
                        $('#displayDepartment').text(response.user.department);
                        $('#displaySemester').text(response.user.semester);
                        
                        // Update form fields
                        $('#editName').val(response.user.name);
                        $('#editEmail').val(response.user.email);
                        $('#editDepartment').val(response.user.department);
                        $('#editSemester').val(response.user.semester);
                    } else {
                        alert('Error loading profile');
                    }
                },
                error: function() {
                    alert('Error loading profile');
                }
            });
        }

        // Update profile
        $('#updateProfileForm').on('submit', function(e) {
            e.preventDefault();
            
            $.ajax({
                url: 'api/update_profile.php',
                method: 'POST',
                data: {
                    name: $('#editName').val(),
                    department: $('#editDepartment').val(),
                    semester: $('#editSemester').val()
                },
                success: function(response) {
                    if (response.success) {
                        $('#updateMessage').html('<div class="alert alert-success">Profile updated successfully!</div>');
                        
                        // Update localStorage
                        localStorage.setItem('user_name', $('#editName').val());
                        document.getElementById('userName').textContent = $('#editName').val();
                        
                        // Reload profile display
                        loadProfile();
                        
                        // Clear message after 3 seconds
                        setTimeout(() => {
                            $('#updateMessage').html('');
                        }, 3000);
                    } else {
                        $('#updateMessage').html('<div class="alert alert-danger">' + response.message + '</div>');
                    }
                },
                error: function() {
                    $('#updateMessage').html('<div class="alert alert-danger">Error updating profile</div>');
                }
            });
        });

        // Load profile when page loads
        $(document).ready(function() {
            loadProfile();
        });
    </script>
</body>
</html>
