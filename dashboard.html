<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SkillExchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <div class="p-4">
                <h4><i class="fas fa-exchange-alt"></i> SkillExchange</h4>
                <hr class="bg-light">
                <div class="text-center mb-4">
                    <i class="fas fa-user-circle fa-3x"></i>
                    <p class="mt-2" id="userName"></p>
                </div>
            </div>
            <a href="dashboard.html"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
            <a href="profile.html"><i class="fas fa-user me-2"></i> My Profile</a>
            <a href="skills.html"><i class="fas fa-tasks me-2"></i> Manage Skills</a>
            <a href="search.html"><i class="fas fa-search me-2"></i> Find Partners</a>
            <a href="requests.html"><i class="fas fa-envelope me-2"></i> Exchange Requests</a>
            <a href="matches.html"><i class="fas fa-handshake me-2"></i> Skill Matches</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </div>
        
        <div class="main-content">
            <div class="container-fluid">
                <h2 class="mb-4">Welcome Back, <span id="welcomeName"></span>!</h2>
                
                <div class="row">
                    <div class="col-md-3 mb-4">
                        <div class="stat-card">
                            <i class="fas fa-chalkboard-teacher"></i>
                            <h3 id="teachCount">0</h3>
                            <p>Skills I Can Teach</p>
                        </div>
                    </div>
                    <div class="col-md-3 mb-4">
                        <div class="stat-card">
                            <i class="fas fa-graduation-cap"></i>
                            <h3 id="learnCount">0</h3>
                            <p>Skills I Want to Learn</p>
                        </div>
                    </div>
                    <div class="col-md-3 mb-4">
                        <div class="stat-card">
                            <i class="fas fa-users"></i>
                            <h3 id="matchesCount">0</h3>
                            <p>Potential Matches</p>
                        </div>
                    </div>
                    <div class="col-md-3 mb-4">
                        <div class="stat-card">
                            <i class="fas fa-clock"></i>
                            <h3 id="pendingRequests">0</h3>
                            <p>Pending Requests</p>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h5>Recent Activity</h5>
                    </div>
                    <div class="card-body">
                        <div id="recentActivity">
                            <p class="text-muted">No recent activity</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(document).ready(function() {
            const userName = localStorage.getItem('user_name');
            $('#userName').text(userName);
            $('#welcomeName').text(userName);
            
            // Load dashboard stats
            $.ajax({
                url: 'api/get_skills.php',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        const teachSkills = response.skills.filter(s => s.skill_type === 'teach');
                        const learnSkills = response.skills.filter(s => s.skill_type === 'learn');
                        $('#teachCount').text(teachSkills.length);
                        $('#learnCount').text(learnSkills.length);
                    }
                }
            });
            
            $.ajax({
                url: 'api/get_matches.php',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        $('#matchesCount').text(response.matches.length);
                    }
                }
            });
        });
    </script>
</body>
</html>
