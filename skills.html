<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Skills - SkillExchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <div class="p-4">
                <h4><i class="fas fa-exchange-alt"></i> SkillExchange</h4>
                <hr class="bg-light">
                <div class="text-center mb-4">
                    <i class="fas fa-user-circle fa-3x"></i>
                    <p class="mt-2" id="userName"></p>
                </div>
            </div>
            <a href="dashboard.html"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a>
            <a href="profile.html"><i class="fas fa-user me-2"></i> My Profile</a>
            <a href="skills.html"><i class="fas fa-tasks me-2"></i> Manage Skills</a>
            <a href="search.html"><i class="fas fa-search me-2"></i> Find Partners</a>
            <a href="requests.html"><i class="fas fa-envelope me-2"></i> Exchange Requests</a>
            <a href="matches.html"><i class="fas fa-handshake me-2"></i> Skill Matches</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </div>
        
        <div class="main-content">
            <div class="container">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-gradient text-white">
                                <h5><i class="fas fa-chalkboard-teacher"></i> Skills I Can Teach</h5>
                            </div>
                            <div class="card-body">
                                <div id="teachSkillsList"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header bg-gradient text-white">
                                <h5><i class="fas fa-graduation-cap"></i> Skills I Want to Learn</h5>
                            </div>
                            <div class="card-body">
                                <div id="learnSkillsList"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card mt-4">
                    <div class="card-header bg-gradient text-white">
                        <h5><i class="fas fa-plus-circle"></i> Add New Skill</h5>
                    </div>
                    <div class="card-body">
                        <form id="addSkillForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <select class="form-control" id="skillId" required>
                                        <option value="">Select a skill...</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <select class="form-control" id="skillType" required>
                                        <option value="teach">I Can Teach This</option>
                                        <option value="learn">I Want to Learn This</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-primary w-100">Add</button>
                                </div>
                            </div>
                        </form>
                        <div id="addMessage" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        function loadSkills() {
            $.ajax({
                url: 'api/get_skills.php',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        const teachSkills = response.skills.filter(s => s.skill_type === 'teach');
                        const learnSkills = response.skills.filter(s => s.skill_type === 'learn');
                        
                        let teachHtml = '';
                        teachSkills.forEach(skill => {
                            teachHtml += `<span class="skill-badge m-1">
                                ${skill.skill_name} 
                                <i class="fas fa-times-circle ms-2" style="cursor:pointer" onclick="removeSkill(${skill.id}, 'teach')"></i>
                            </span>`;
                        });
                        if (teachSkills.length === 0) teachHtml = '<p class="text-muted">No skills added yet</p>';
                        $('#teachSkillsList').html(teachHtml);
                        
                        let learnHtml = '';
                        learnSkills.forEach(skill => {
                            learnHtml += `<span class="skill-badge m-1" style="background: #28a745;">
                                ${skill.skill_name} 
                                <i class="fas fa-times-circle ms-2" style="cursor:pointer" onclick="removeSkill(${skill.id}, 'learn')"></i>
                            </span>`;
                        });
                        if (learnSkills.length === 0) learnHtml = '<p class="text-muted">No skills added yet</p>';
                        $('#learnSkillsList').html(learnHtml);
                    }
                }
            });
        }
        
        function loadAllSkills() {
            $.ajax({
                url: 'api/get_all_skills.php',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        let options = '<option value="">Select a skill...</option>';
                        response.skills.forEach(skill => {
                            options += `<option value="${skill.id}">${skill.skill_name} (${skill.category})</option>`;
                        });
                        $('#skillId').html(options);
                    }
                }
            });
        }
        
        function removeSkill(skillId, type) {
            if (confirm('Are you sure you want to remove this skill?')) {
                $.ajax({
                    url: 'api/remove_skill.php',
                    method: 'POST',
                    data: {
                        skill_id: skillId,
                        skill_type: type
                    },
                    success: function(response) {
                        if (response.success) {
                            loadSkills();
                        }
                    }
                });
            }
        }
        
        $('#addSkillForm').on('submit', function(e) {
            e.preventDefault();
            $.ajax({
                url: 'api/add_skill.php',
                method: 'POST',
                data: {
                    skill_id: $('#skillId').val(),
                    skill_type: $('#skillType').val()
                },
                success: function(response) {
                    if (response.success) {
                        $('#addMessage').html('<div class="alert alert-success">Skill added successfully!</div>');
                        loadSkills();
                        $('#skillId').val('');
                        setTimeout(() => $('#addMessage').html(''), 2000);
                    } else {
                        $('#addMessage').html('<div class="alert alert-danger">' + response.message + '</div>');
                    }
                }
            });
        });
        
        $(document).ready(function() {
            $('#userName').text(localStorage.getItem('user_name'));
            loadSkills();
            loadAllSkills();
        });
    </script>
</body>
</html>
